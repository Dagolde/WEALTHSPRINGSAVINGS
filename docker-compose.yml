version: '3.8'

services:
  # Laravel Backend
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rotational_laravel
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rotational_contribution
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    volumes:
      - ./backend:/var/www/html
      - laravel_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rotational_network
    command: php artisan serve --host=0.0.0.0 --port=8000

  # Laravel Queue Worker
  laravel_queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rotational_laravel_queue
    environment:
      - APP_ENV=development
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=rotational_contribution
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis
      - laravel
    networks:
      - rotational_network
    command: php artisan queue:work --tries=3 --timeout=90

  # FastAPI Microservices
  fastapi:
    build:
      context: ./microservices
      dockerfile: Dockerfile
    container_name: rotational_fastapi
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/rotational_contribution
      - REDIS_URL=redis://:password@redis:6379/0
      - CELERY_BROKER_URL=redis://:password@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:password@redis:6379/3
      - LARAVEL_API_URL=http://laravel:8000
    env_file:
      - ./microservices/.env
    volumes:
      - ./microservices:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rotational_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./microservices
      dockerfile: Dockerfile
    container_name: rotational_celery_worker
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/rotational_contribution
      - REDIS_URL=redis://:password@redis:6379/0
      - CELERY_BROKER_URL=redis://:password@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:password@redis:6379/3
      - LARAVEL_API_URL=http://laravel:8000
    env_file:
      - ./microservices/.env
    volumes:
      - ./microservices:/app
    depends_on:
      - postgres
      - redis
      - fastapi
    networks:
      - rotational_network
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./microservices
      dockerfile: Dockerfile
    container_name: rotational_celery_beat
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/rotational_contribution
      - REDIS_URL=redis://:password@redis:6379/0
      - CELERY_BROKER_URL=redis://:password@redis:6379/2
      - CELERY_RESULT_BACKEND=redis://:password@redis:6379/3
      - LARAVEL_API_URL=http://laravel:8000
    env_file:
      - ./microservices/.env
    volumes:
      - ./microservices:/app
    depends_on:
      - postgres
      - redis
      - celery_worker
    networks:
      - rotational_network
    command: celery -A app.celery_app beat --loglevel=info

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: rotational_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=rotational_contribution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rotational_contribution"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rotational_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: rotational_redis
    command: redis-server --requirepass password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - rotational_network

  # Nginx (Load Balancer & Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: rotational_nginx
    ports:
      - "8002:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/public:/var/www/html/public:ro
      - laravel_storage:/var/www/html/storage:ro
    depends_on:
      - laravel
      - fastapi
    networks:
      - rotational_network

  # Adminer (Database Management UI)
  adminer:
    image: adminer:latest
    container_name: rotational_adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - rotational_network

  # Redis Commander (Redis Management UI)
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: rotational_redis_commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:password
    depends_on:
      - redis
    networks:
      - rotational_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  laravel_storage:
    driver: local

networks:
  rotational_network:
    driver: bridge
