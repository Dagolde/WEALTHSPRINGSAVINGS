name: ajo_app
description: Rotational Contribution App (Ajo Platform) - Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # HTTP Client
  dio: ^5.4.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # UI Components
  cupertino_icons: ^1.0.2
  
  # Form Validation
  flutter_form_builder: ^9.1.1
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Image Compression
  flutter_image_compress: ^2.1.0
  
  # Path Provider for file operations
  path_provider: ^2.1.1
  
  # Environment Configuration
  flutter_dotenv: ^5.1.0
  
  # Shared Preferences
  shared_preferences: ^2.2.2
  
  # Routing
  go_router: ^13.0.0
  
  # Firebase Cloud Messaging
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  
  # Local Notifications
  flutter_local_notifications: ^17.0.0
  
  # Share functionality
  share_plus: ^7.2.1
  
  # Date formatting
  intl: ^0.18.1
  
  # WebView for payment gateway
  webview_flutter: ^4.4.4
  
  # URL launcher
  url_launcher: ^6.2.2
  
  # Connectivity
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - .env
