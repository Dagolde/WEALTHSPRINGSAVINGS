name: Deploy to CloudPanel

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pgsql, mbstring, xml, bcmath, curl, zip, gd, redis
          
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Pull latest code
            git pull origin main
            
            # Clear composer cache to ensure fresh install
            composer clear-cache
            
            # Remove vendor directory to force clean install
            rm -rf vendor
            
            # Install/Update Composer dependencies
            composer install --optimize-autoloader --no-dev --no-scripts
            
            # Run migrations
            php artisan migrate --force
            
            # Clear and cache configuration
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear
            
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Restart queue workers
            sudo supervisorctl restart rotational-worker:* || echo "Queue workers not configured"
            
            # Set permissions
            chmod -R 755 storage bootstrap/cache
            
            echo "Deployment completed successfully!"
