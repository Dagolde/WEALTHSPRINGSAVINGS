version: '3.8'

services:
  # FastAPI Application
  fastapi:
    build: .
    container_name: rotational_fastapi
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/rotational_contribution
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - rotational_network

  # Celery Worker
  celery_worker:
    build: .
    container_name: rotational_celery_worker
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/rotational_contribution
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: celery -A app.celery_app worker --loglevel=info
    networks:
      - rotational_network

  # Celery Beat (Scheduler)
  celery_beat:
    build: .
    container_name: rotational_celery_beat
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/rotational_contribution
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: celery -A app.celery_app beat --loglevel=info
    networks:
      - rotational_network

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: rotational_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=rotational_contribution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rotational_contribution"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rotational_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: rotational_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - rotational_network

volumes:
  postgres_data:
  redis_data:

networks:
  rotational_network:
    driver: bridge
